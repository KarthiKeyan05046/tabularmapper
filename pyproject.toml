[project]
name = "bank-statement-mapper"
version = "0.1.0"
description = "Map any bank statement .xlsx to a standard schema (deterministic + optional local embedding fallback)"
readme = "README.md"
requires-python = ">=3.9"
# Core engine deps — required. The default build makes ZERO network calls.
dependencies = [
    "openpyxl>=3.1",
    "rapidfuzz>=3.0",
    "python-dateutil>=2.8",
]

# The AI table matcher (ai_matcher.py) uses only the Python standard library
# (urllib) to call any OpenAI-compatible endpoint — no SDK dependency needed.
# Set OPENAI_API_KEY / OPENAI_BASE_URL / OPENAI_MODEL to enable it.

[project.scripts]
bank-mapper = "cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
